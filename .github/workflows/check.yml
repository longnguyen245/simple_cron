name: check-release

on:
  schedule:
    - cron: "0 2 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Package
        run: |
          sudo apt-get update
          sudo apt-get install -y jd

      - name: Get latest release asset
        id: rel
        run: |
          URL=$(curl -s https://api.github.com/repos/dabeecao/telecloud-go/releases/latest \
          | jq -r '.assets[] | select(.name | contains("linux_amd64")) | .browser_download_url' \
          | head -n1)

          echo "$URL" > download.txt

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.txt
          git commit -m "update version" || exit 0
          git push