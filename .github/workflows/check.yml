name: check-release

on:
  schedule:
    - cron: "0 2 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release
        id: rel
        run: |
          VERSION=$(curl -s https://api.github.com/repos/dabeecao/telecloud-go/releases/latest | jq -r .tag_name)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compare version
        run: |
          OLD=$(cat version.txt 2>/dev/null || echo "none")
          NEW=${{ steps.rel.outputs.version }}

          echo "OLD=$OLD"
          echo "NEW=$NEW"

          if [ "$OLD" != "$NEW" ]; then
            echo $NEW > version.txt
          else
            echo "no change" && exit 0
          fi

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "update version" || exit 0
          git push