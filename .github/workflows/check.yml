name: check-release

on:
  schedule:
    - cron: "0 */6 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Package
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get latest release asset
        run: |
          URL=$(curl -s https://api.github.com/repos/longnguyen245/telecloud-go/releases/latest \
          | jq -r '.assets[] | select(.name | contains("linux_amd64")) | .browser_download_url' \
          | head -n1)

          echo "$URL" > download.txt

      - name: Commit only if URL changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_URL=$(cat download.txt)
          OLD_URL=$(cat download.txt 2>/dev/null || echo "")

          git fetch origin main
          git checkout origin/main -- download.txt 2>/dev/null || true

          OLD_URL=$(cat download.txt 2>/dev/null || echo "")

          if [ "$NEW_URL" = "$OLD_URL" ]; then
            echo "URL unchanged -> skip commit"
            exit 0
          fi

          echo "$NEW_URL" > download.txt
          git add download.txt
          git commit -m "update download url"
          git push
